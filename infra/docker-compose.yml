name: futinform

services:
  db:
    image: postgres:18
    container_name: futinform_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - futinform_data:/var/lib/postgresql

volumes:
  futinform_data: